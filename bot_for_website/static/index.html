<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QADAM Robotics — демо-чатбот</title>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --bot:#334155; --me:#2563eb; --text:#e2e8f0; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         background:var(--bg); color:var(--text); height:100vh; display:flex; }
  .wrap { margin:auto; width:min(680px, 94vw); height:min(88vh, 820px);
          background:var(--card); border-radius:16px; display:flex; flex-direction:column;
          overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.4); }
  header { padding:16px 20px; background:#111827; font-weight:600; display:flex; gap:10px; align-items:center; }
  header .dot { width:10px; height:10px; border-radius:50%; background:#22c55e; }
  #log { flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:78%; padding:10px 14px; border-radius:14px; line-height:1.4; white-space:pre-wrap; word-wrap:break-word; }
  .me  { align-self:flex-end; background:var(--me); border-bottom-right-radius:4px; }
  .bot { align-self:flex-start; background:var(--bot); border-bottom-left-radius:4px; }
  .typing { opacity:.6; font-style:italic; }
  form { display:flex; gap:8px; padding:14px; background:#111827; }
  input { flex:1; padding:12px 14px; border-radius:10px; border:1px solid #334155; background:#0b1220; color:var(--text); font-size:15px; }
  button { padding:12px 18px; border:0; border-radius:10px; background:var(--me); color:#fff; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
</style>
</head>
<body>
  <div class="wrap">
    <header><span class="dot"></span> Алихан · QADAM Robotics</header>
    <div id="log"></div>
    <form id="form">
      <input id="input" autocomplete="off" placeholder="Напишите сообщение…" />
      <button id="send" type="submit">➤</button>
    </form>
  </div>
<script>
  // Тестовая страница. Показывает, как фронтенд общается с /api/chat.
  const log = document.getElementById('log');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const send = document.getElementById('send');
  let sessionId = localStorage.getItem('qadam_session') || null;

  function bubble(text, who) {
    const el = document.createElement('div');
    el.className = 'msg ' + who;
    el.textContent = text;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    return el;
  }

  async function sendMessage(text) {
    bubble(text, 'me');
    const typing = bubble('печатает…', 'bot');
    typing.classList.add('typing');
    send.disabled = true;
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });
      const data = await res.json();
      sessionId = data.session_id;
      localStorage.setItem('qadam_session', sessionId);
      typing.remove();
      (data.replies && data.replies.length ? data.replies : ['…']).forEach(r => bubble(r, 'bot'));
    } catch (e) {
      typing.remove();
      bubble('Ошибка сети. Проверьте, что connector и Rasa запущены.', 'bot');
    } finally {
      send.disabled = false;
      input.focus();
    }
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    sendMessage(text);
  });

  bubble('Здравствуйте! Я Алихан 🤖 Спросите про курсы, цену, расписание или запишите ребёнка на пробное.', 'bot');
</script>
</body>
</html>
