language: ru

pipeline:
- name: WhitespaceTokenizer
- name: RegexFeaturizer
- name: LexicalSyntacticFeaturizer
- name: CountVectorsFeaturizer       # по словам
  analyzer: word
  min_ngram: 1
  max_ngram: 1
- name: CountVectorsFeaturizer       # по символам (русский помогает)
  analyzer: char_wb
  min_ngram: 3
  max_ngram: 5
- name: DIETClassifier
  epochs: 100
  random_seed: 42
- name: EntitySynonymMapper
- name: ResponseSelector
  epochs: 100
- name: FallbackClassifier
  threshold: 0.6
  ambiguity_threshold: 0.1

policies:
- name: RulePolicy
- name: MemoizationPolicy
  max_history: 5
- name: TEDPolicy
  epochs: 60
