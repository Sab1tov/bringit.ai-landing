version: "3.1"

intents:
  - greet
  - goodbye
  - ask_schedule
  - ask_address
  - ask_price
  - enroll_course
  - free_question
  - affirm

entities:
  - grade
  - district
  - child_name
  - phone

slots:
  grade:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  district:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  child_name:
    type: text
    influence_conversation: true
    mappings:
      - type: from_text
        conditions:
          - active_loop: enrollment_form
            requested_slot: child_name

  phone:
    type: text
    influence_conversation: true
    mappings:
      - type: from_text
        conditions:
          - active_loop: enrollment_form
            requested_slot: phone

  enroll_done:
    type: bool
    influence_conversation: true
    initial_value: false
    mappings:
      - type: custom

forms:
  enrollment_form:
    required_slots:
      - child_name
      - phone

responses:
  utter_greet:
    - text: |
        Здравствуйте! Я Мо, виртуальный ассистент BringAI 🤖

        Подскажите, что вас интересует: возможности интеграции, процесс внедрения, поддержка или запись на демо-презентацию?

  utter_goodbye:
    - text: |
        Хорошо, спасибо за обращение 🙂

        Если захотите протестировать систему, просто напишите: «запиши меня на демо» — я быстро оформлю заявку.

  utter_schedule:
    - text: |
        Внедрение обычно занимает от 5 до 10 рабочих дней.

        Если нужны подробности, напишите, готовы ли у вас доступы и лицензии, и я расскажу детальнее.

  utter_address:
    - text: |
        Мы работаем удаленно по всему Казахстану и СНГ 📍

        Все настройки и тестирование интеграции проводятся онлайн нашими инженерами.

  utter_price:
    - text: |
        Стоимость внедрения и поддержки рассчитывается индивидуально под ваши бизнес-задачи.

        У нас нет стандартной фиксированной сетки цен, так как объем работ зависит от сложности процессов и количества каналов. Заполните форму записи на демо, и мы подготовим расчет!

  utter_ask_grade:
    - text: "Хорошо, давайте запишемся на демо-презентацию. Какую CRM-систему вы используете? Например: amoCRM."

  utter_ask_district:
    - text: "Какие каналы связи вы хотите подключить? Например: WhatsApp и Instagram."

  utter_ask_child_name:
    - text: "Как к вам обращаться? (Ваше имя)"

  utter_ask_phone:
    - text: "Укажите ваш номер телефона для подтверждения записи на демо."

  utter_enroll_summary:
    - text: |
        Отлично, заявку на демо принял ✅

        Имя: {child_name}
        Телефон: {phone}

        Наш менеджер подготовит индивидуальный расчет под ваши задачи и свяжется с вами в течение 5–10 минут.

  utter_default:
    - text: |
        Сейчас попробую найти точный ответ по интеграции. Если не найду — лучше уточнит наш менеджер 🙂

  utter_faq_not_found:
    - text: |
        Тут лучше уточнит менеджер, чтобы предоставить вам точную техническую информацию.

        Могу пока помочь с описанием возможностей, этапами внедрения, поддержкой или записью на демо-презентацию 🙂

actions:
  - validate_enrollment_form
  - action_after_enroll
  - action_faq_search
  - action_rag_answer
  - action_smart_answer

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
